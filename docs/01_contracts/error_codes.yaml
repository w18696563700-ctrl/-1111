doc_meta:
  owner: Codex 总控
  status: draft
  purpose: Freeze formal error code namespaces and ownership.
  layer: L2 Contracts

version: 0.1.0
generation_input_boundary:
  phase: first_batch
  role: formal_input
  paired_formal_inputs:
    - docs/01_contracts/openapi.yaml
    - docs/01_contracts/error_codes.yaml
  single_generation_entry: pnpm contracts:generate
  single_drift_check_entry: pnpm contracts:check
  output_root: packages/contracts
  first_batch_output_coverage:
    primary_projection:
      - error-codes.ts
      - index.ts
    shared_manifest_set:
      - contracts-manifest.json
      - openapi.bundle.json
      - app-api.types.ts
  direct_consumer_binding:
    - apps/server
    - apps/bff
  not_directly_bound_in_first_batch:
    - apps/mobile
    - apps/admin
  idempotency:
    same_input_same_output_required: true
    content_identical: true
    path_set_identical: true
    export_order_identical: true
    manifest_hash_identical: true
    forbidden_nondeterministic_content:
      - timestamp
      - machine_path
      - username
      - random_value
  drift_check_failure_conditions:
    - input_missing
    - expected_output_missing
    - output_outside_packages_contracts
    - dirty_diff_after_regeneration
    - manifest_hash_mismatch
    - multiple_generation_entries_present
namespaces:
  - AUTH
  - HOME
  - LOCATION
  - ORG
  - CERTIFICATION
  - SECURITY
  - PROJECT
  - BID
  - THREAD
  - ORDER
  - CONTRACT
  - MILESTONE
  - INSPECTION
  - RATING
  - DISPUTE
  - FORUM
  - MESSAGE_INTERACTION
  - COUNTERPART_CONVERSATION
  - PROJECT_COMMUNICATION
  - ENTERPRISE_HUB
  - GOVERNANCE
  - FILE
  - REVIEW
  - ORG_REVIEW
  - MEMBERSHIP
  - CONFIG
  - PLATFORM
  - NOTIFICATION
  - PUSH
  - FILE_PREVIEW
  - CONFIRMATION_SOFTLINK
