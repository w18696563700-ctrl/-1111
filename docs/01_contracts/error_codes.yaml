doc_meta:
  owner: Codex 总控
  status: draft
  purpose: Freeze formal error code namespaces and ownership.
  layer: L2 Contracts

version: 0.1.0
generation_input_boundary:
  phase: first_batch
  role: formal_input
  paired_formal_inputs:
    - docs/01_contracts/openapi.yaml
    - docs/01_contracts/error_codes.yaml
  single_generation_entry: pnpm contracts:generate
  single_drift_check_entry: pnpm contracts:check
  output_root: packages/contracts
  first_batch_output_coverage:
    primary_projection:
      - error-codes.ts
      - index.ts
    shared_manifest_set:
      - contracts-manifest.json
      - openapi.bundle.json
      - app-api.types.ts
  direct_consumer_binding:
    - apps/server
    - apps/bff
  not_directly_bound_in_first_batch:
    - apps/mobile
    - apps/admin
  idempotency:
    same_input_same_output_required: true
    content_identical: true
    path_set_identical: true
    export_order_identical: true
    manifest_hash_identical: true
    forbidden_nondeterministic_content:
      - timestamp
      - machine_path
      - username
      - random_value
  drift_check_failure_conditions:
    - input_missing
    - expected_output_missing
    - output_outside_packages_contracts
    - dirty_diff_after_regeneration
    - manifest_hash_mismatch
    - multiple_generation_entries_present
namespaces:
  - AUTH
  - HOME
  - LOCATION
  - ORG
  - CERTIFICATION
  - SECURITY
  - PROJECT
  - BID
  - THREAD
  - ORDER
  - CONTRACT
  - MILESTONE
  - INSPECTION
  - RATING
  - DISPUTE
  - FORUM
  - ENTERPRISE_HUB
  - GOVERNANCE
  - FILE
  - REVIEW
  - ORG_REVIEW
  - MEMBERSHIP
  - CONFIG
  - PLATFORM
codes:
  - code: AUTH_SESSION_INVALID
    owner: Server
    meaning: Session or refresh context is no longer valid.
  - code: AUTH_OTP_SEND_INVALID
    owner: Server
    meaning: OTP send request is missing required fields or violates the current minimum send boundary.
  - code: AUTH_OTP_LOGIN_INVALID
    owner: Server
    meaning: OTP login request is missing required fields or the submitted OTP login command is not acceptable under the current minimum login boundary.
  - code: AUTH_CONSENT_REQUIRED
    owner: Server
    meaning: OTP login is rejected because the current actor has not explicitly confirmed the current user agreement and privacy policy boundary.
  - code: AUTH_REFRESH_INVALID
    owner: Server
    meaning: Session refresh request is missing required fields, is replayed, or cannot rotate the current refresh session truth.
  - code: AUTH_LOGOUT_INVALID
    owner: Server
    meaning: Logout request is missing required fields or cannot revoke the targeted current-session scope.
  - code: AUTH_OTP_RATE_LIMITED
    owner: Server
    meaning: OTP send or OTP login is blocked by the current controlled anti-abuse rate limit.
  - code: AUTH_OTP_SEND_LIMIT_REACHED
    owner: Server
    meaning: The current mobile has reached the upstream OTP send limit window and must wait for the provider limit to reset before another OTP may be sent.
  - code: AUTH_PERMISSION_INSUFFICIENT
    owner: Server
    meaning: The current actor role or object scope is insufficient for the requested identity or profile action.
  - code: AUTH_RESOURCE_UNAVAILABLE
    owner: BFF
    meaning: The current identity or profile resource is controlled-unavailable, hidden, or not materialized for the current actor and route boundary.
  - code: LOCATION_REQUIRED
    owner: BFF
    meaning: Home aggregation cannot determine an effective location from current request, current session, or fallback context.
  - code: LOCATION_PERMISSION_UNAVAILABLE
    owner: BFF
    meaning: Device location permission or device location capability is unavailable for the current home weather request and no equivalent location carrier is available.
  - code: HOME_WEATHER_UPSTREAM_UNAVAILABLE
    owner: BFF
    meaning: The normalized upstream weather provider cannot return a usable weather projection for the current exhibition home request.
  - code: HOME_REFRESH_TIMEOUT
    owner: BFF
    meaning: Exhibition home refresh exceeded the allowed timeout window before the normalized full-home projection was ready.
  - code: HOME_AGGREGATION_UNAVAILABLE
    owner: BFF
    meaning: Exhibition home aggregation cannot return a stable read model for the current actor and effective province context.
  - code: ORG_CREATE_INVALID
    owner: Server
    meaning: Organization create request is missing required fields or violates the minimum organization creation boundary.
  - code: ORG_JOIN_INVALID
    owner: Server
    meaning: Organization join-by-code request is missing required fields or references an invalid current invite boundary.
  - code: ORG_JOIN_DUPLICATE
    owner: Server
    meaning: The current actor already belongs to the target organization or has already consumed the same invite path.
  - code: ORG_SWITCH_INVALID
    owner: Server
    meaning: Organization switch request is missing required fields or targets an organization that is not available to the current actor.
  - code: ORG_MEMBER_ROLE_INVALID
    owner: Server
    meaning: Organization member role change request is missing required fields or violates the current minimum membership role boundary.
  - code: ORG_MEMBER_DISABLE_INVALID
    owner: Server
    meaning: Organization member disable request is missing required fields or violates the current minimum membership disable boundary.
  - code: CERTIFICATION_SUBMIT_INVALID
    owner: Server
    meaning: Certification submit request is missing required fields or violates the current minimum certification submission boundary.
  - code: CERTIFICATION_RESUBMIT_INVALID
    owner: Server
    meaning: Certification resubmit request is missing required fields or violates the current minimum certification resubmission boundary.
  - code: CERTIFICATION_REVALIDATE_INVALID
    owner: Server
    meaning: Certification revalidate request is missing required fields or violates the current approved-organization certification correction boundary.
  - code: CERTIFICATION_DUPLICATE_SUBMIT
    owner: Server
    meaning: Certification submit or resubmit is rejected because the current certification state does not allow a second equivalent submit command.
  - code: ORG_REVIEW_RESOURCE_UNAVAILABLE
    owner: Server
