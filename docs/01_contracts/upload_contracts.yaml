doc_meta:
  owner: Codex 总控
  status: draft
  purpose: Freeze the three-step upload contract and file truth policy.
  layer: L2 Contracts

version: 0.1.0
flow:
  - step: init
    actor: Flutter App
    via: BFF
    required_fields:
      - businessType
      - businessId
      - fileKind
      - mimeType
      - size
      - checksum
  - step: direct_upload
    actor: Flutter App
    via: S3-compatible OSS
    notes:
      - client may upload directly after signed strategy is returned
      - client must not use long-lived credentials
  - step: confirm
    actor: Flutter App
    via: BFF -> Server
    outcome:
      - create FileAsset
      - optionally create Evidence binding
      - do not create project attachment business truth by confirm alone
      - enqueue orphan cleanup if confirm fails
rules:
  - objectKey is storage location only
  - FileAsset is business truth
  - Evidence is workflow truth when attached to milestone or inspection
  - post-publish project attachment supplement reuses the same three-step upload corridor
  - for the post-publish project attachment supplement corridor, upload init freezes `businessType=project`, `fileKind=project_attachment`, and concrete `businessId=projectId`
  - post-publish project attachment supplement allows only `image/png`, `image/jpeg`, `image/webp`, `application/pdf`, `application/msword`, and `application/vnd.openxmlformats-officedocument.wordprocessingml.document`
  - confirmed FileAsset is still not project attachment business truth; project-owned attachment truth must be created by the dedicated project attachment family
