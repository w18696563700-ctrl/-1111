    ExhibitionHomeResponse:
      type: object
      required:
        - currentLocation
        - selectionScope
        - isUsingDeviceLocation
        - currentWeather
        - currentTemperature
        - highTemperature
        - lowTemperature
        - precipitationProbability
        - constructionRiskLevel
        - constructionRiskSummary
        - riskTags
        - riskTimeLabel
        - nightRainExpected
        - nightRainTimeLabel
        - officialAlerts
        - constructionSuggestions
        - hourlyForecast
        - dailyForecast
        - updatedAt
        - sourceLabel
        - selectionNotice
        - canExpand
        - refreshable
        - modules
        - recommendationSections
      description: >
        Normalized ordered exhibition home read model only. This response may
        aggregate current location and weather data, but it must not create
        persisted weather truth, persisted location truth, or a second home
        workflow state machine. The current weather block may include a V1
        construction weather warning semantic layer shaped by `BFF` fixed
        rules only.
      properties:
        currentLocation:
          $ref: '#/components/schemas/ExhibitionHomeLocation'
        selectionScope:
          $ref: '#/components/schemas/HomeSelectionScope'
        isUsingDeviceLocation:
          type: boolean
        currentWeather:
          type: string
        currentTemperature:
          type: number
        highTemperature:
          type: number
        lowTemperature:
          type: number
        precipitationProbability:
          type: integer
          minimum: 0
          maximum: 100
        constructionRiskLevel:
          type: string
          enum:
            - low
            - medium
            - high
            - critical
          description: >
            Current construction-risk level derived by `BFF` fixed-rule
            evaluation only.
        constructionRiskSummary:
          type: string
          description: >
            User-facing fixed-template summary for today's construction risk.
        riskTags:
          type: array
          description: >
            Active fixed-rule tags only. Current canonical values are:
            `rain`, `night_rain`, `high_temp`, `low_temp`, `strong_wind`,
            `lightning`, and `official_alert`.
          items:
            type: string
            enum:
              - rain
              - night_rain
              - high_temp
              - low_temp
              - strong_wind
              - lightning
              - official_alert
        riskTimeLabel:
          type:
            - string
            - 'null'
          description: >
            Current highest-priority construction-risk time label only. May be
            `null` when stable timing is unavailable.
        nightRainExpected:
          type: boolean
          description: >
            Explicit current-night rain expectation for construction planning.
        nightRainTimeLabel:
          type:
            - string
            - 'null'
          description: >
            Current-night rain time label only. May be `null` when stable
            timing is unavailable.
        officialAlerts:
          type: array
          description: >
            Controlled user-facing official-alert strings only. This array may
            be empty.
          items:
            type: string
        constructionSuggestions:
          type: array
          minItems: 3
          maxItems: 5
          description: >
            Fixed-template construction suggestions only. This field must not
            contain `LLM`-generated free text.
          items:
            type: string
        hourlyForecast:
          type: array
          items:
            $ref: '#/components/schemas/ExhibitionHomeHourlyForecastItem'
        dailyForecast:
          type: array
          items:
            $ref: '#/components/schemas/ExhibitionHomeDailyForecastItem'
        updatedAt:
          type: string
          format: date-time
        sourceLabel:
          type: string
          description: >
            User-facing controlled source label only. Provider-native labels
            remain hidden.
        selectionNotice:
          type: string
          description: >
            Explicit current-round location persistence notice for direct
            frontend display.
        canExpand:
          type: boolean
        refreshable:
          type: boolean
        modules:
          type: array
          minItems: 6
          maxItems: 6
          items:
            $ref: '#/components/schemas/ExhibitionHomeModuleCard'
        recommendationSections:
          type: array
          items:
            $ref: '#/components/schemas/ExhibitionHomeRecommendationSection'
