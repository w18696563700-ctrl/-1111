x-instance-todo-registry:
  capability: instance_todo_touchpoint
  messageType:
    fixed: instance_todo
  state:
    fixed: pending
  objectTypes:
    first_batch:
      - inspection
      - dispute
      - project_clarification
      - bid_thread
  actionKeys:
    first_batch:
      - inspection.submit
      - dispute.open
      - project_clarification.open
      - bid_thread.open
  routeTargetBoundary:
    existing_signed_instance_entry_only: true
    unfrozen_new_app_facing_path_forbidden: true
    arbitrary_deeplink_forbidden: true
x-unified-instance-entry-registry:
  capability: unified_instance_entry_registration_preembed
  itemSchema:
    $ref: '#/components/schemas/RegisteredInstanceEntryItem'
  first_batch:
    - entryKey: inspection_submit_entry
      objectType: inspection
      actionKey: inspection.submit
      canonicalPath: /api/app/inspection/detail
      requiredParams:
        - milestoneId
      consumerBuilding: messages
      localEntryKey: registered.inspection.submit
      state: enabled
    - entryKey: dispute_open_entry
      objectType: dispute
      actionKey: dispute.open
      canonicalPath: /api/app/order/detail
      requiredParams:
        - orderId
      consumerBuilding: messages
      localEntryKey: registered.dispute.open
      state: enabled
    - entryKey: project_clarification_open_entry
      objectType: project_clarification
      actionKey: project_clarification.open
      canonicalPath: /api/app/project/clarification/list
      requiredParams:
        - projectId
      consumerBuilding: messages
      localEntryKey: registered.project_clarification.open
      state: enabled
    - entryKey: bid_thread_open_entry
      objectType: bid_thread
      actionKey: bid_thread.open
      canonicalPath: /api/app/bid/thread/detail
      requiredParams:
        - projectId
        - bidId
      consumerBuilding: messages
      localEntryKey: registered.bid_thread.open
      state: enabled
components:
  schemas:
    AppVisibleBuilding:
      type: string
      enum:
        - exhibition
        - messages
        - profile
        - renovation
        - custom_furniture
      description: >
        Controlled shell-visible building code only. This field is a shell
        projection, not a second navigation tree or local route contract.
    AppShellUnreadSummary:
      type: object
      description: >
        Controlled unread bucket summary only. This object is not a message
        center truth surface, delivery-state ledger, or notification
        orchestration model.
      additionalProperties:
        type: integer
        minimum: 0
    AppShellContextResponse:
      type: object
      required:
        - userId
        - organizationId
        - organizationType
        - roleKeys
        - certificationStatus
        - membershipStatus
        - visibleBuildings
        - featureFlagsVersion
        - unreadSummary
      properties:
        userId:
          type: string
        organizationId:
          type:
            - string
            - 'null'
          description: >
            Nullable when the current actor has no organization scope.
        organizationType:
          type:
            - string
            - 'null'
          description: >
            Nullable when the current actor has no organization scope. This
            field only carries the current organization-type projection needed
            by app-facing eligibility handoff and does not replace
            `profile/organization/mine`.
        roleKeys:
          type: array
          items:
            type: string
          uniqueItems: true
        certificationStatus:
          type:
            - string
            - 'null'
        membershipStatus:
          type:
            - string
            - 'null'
        visibleBuildings:
          type: array
          items:
            $ref: '#/components/schemas/AppVisibleBuilding'
          uniqueItems: true
        featureFlagsVersion:
          type: string
        unreadSummary:
          $ref: '#/components/schemas/AppShellUnreadSummary'
        projectCreateEligibility:
          $ref: '#/components/schemas/AppProjectCreateEligibilityProjection'
        paidMembershipTier:
          type:
            - string
            - 'null'
        paidMembershipEntitlementsSummary:
          type: array
          items:
            type: string
        paidMembershipQuotaSummary:
          type: array
          items:
            type: string
        paidMembershipNextRefreshAt:
          type:
            - string
            - 'null'
          format: date-time
    AppProjectCreateEligibilityProjection:
      type:
        - object
        - 'null'
      required:
        - canCreateProject
      description: >
        Minimum app-facing project-create eligibility projection for
        Flutter-only create-entry gating. This carrier is derived from the
        same current publish-eligibility truth and does not create a second
        state machine or replace the publish command checks.
      properties:
        canCreateProject:
          type: boolean
    ProfileIndexResponse:
      type: object
      required:
        - organization
        - certification
        - membership
        - settingsEntry
      properties:
        organization:
          $ref: '#/components/schemas/ProfileOrganizationSummary'
        certification:
          $ref: '#/components/schemas/ProfileCertificationSummary'
        membership:
          $ref: '#/components/schemas/ProfileMembershipSummary'
        settingsEntry:
          $ref: '#/components/schemas/ProfileSettingsEntry'
    ProfileOrganizationSummary:
      type: object
      required:
        - organizationId
        - roleKeys
        - visibleBuildings
      description: >
        Minimum read-only organization projection for the profile building only.
      properties:
        organizationId:
          type:
            - string
            - 'null'
          description: >
            Nullable when the current actor has no organization scope.
        roleKeys:
          type: array
          items:
            type: string
          uniqueItems: true
        visibleBuildings:
          type: array
          items:
            $ref: '#/components/schemas/AppVisibleBuilding'
          uniqueItems: true
    ProfileCertificationSummary:
      type: object
      required:
        - status
      description: >
        Minimum read-only certification projection only.
      properties:
        status:
          type:
            - string
            - 'null'
    ProfileMembershipSummary:
      type: object
      required:
        - status
      description: >
        Minimum read-only membership projection only.
      properties:
        status:
          type:
            - string
            - 'null'
    MembershipCurrentResponse:
      type: object
      required:
        - organizationId
