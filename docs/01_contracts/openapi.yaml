    ProjectCreateRequest:
      type: object
      required:
        - title
        - buildingType
        - budgetAmount
        - provinceCode
        - provinceName
        - cityCode
        - cityName
        - detailAddress
        - scopeSummary
      description: >
        Minimum project create command request only. This request now freezes
        the minimum standardized location and address-and-scope carrier for
        project publish create/detail. Province and city now use canonical
        `code + name` pairs; district uses the same `code + name` contract when
        district detail is separately provided. `detailAddress` remains free
        text and does not carry classification truth. For Round B, the admitted
        richer create/detail fields are `areaSqm`, `buildingTypeRemark`, and
        `scheduleDetail`. `districtCode`, `districtName`, `plannedStartAt`,
        `plannedEndAt`, `description`, `areaSqm`, `buildingTypeRemark`, and
        `scheduleDetail` remain optional in the current frozen boundary.
      properties:
        title:
          type: string
        buildingType:
          type: string
        budgetAmount:
          type: number
        areaSqm:
          type:
            - number
            - 'null'
          minimum: 0.01
          multipleOf: 0.01
          description: >
            Optional project area in canonical `sqm` units only. When
            provided, the value must be positive and use at most two decimal
            places. This field is admitted for Round B create/detail truth only
            and does not yet imply list or workbench projection ownership.
        buildingTypeRemark:
          type:
            - string
            - 'null'
          maxLength: 100
          description: >
            Optional supplementary remark for the current coarse
            `buildingType`. This field does not replace `buildingType`, does
            not create a second project-type truth family, and should be
            omitted or `null` when no extra remark is provided.
        provinceCode:
          type: string
          description: >
            Required canonical province classification code. This field carries
            standardized region truth for publish, downstream display grouping,
            regional classification, and search filtering. It must travel with
            `provinceName`.
        provinceName:
          type: string
          description: >
            Required human-readable province display value paired with
            `provinceCode`.
        cityCode:
          type: string
          description: >
            Required canonical city classification code. This field carries
            standardized region truth for publish, downstream display grouping,
            regional classification, and search filtering. It must travel with
            `cityName`.
        cityName:
          type: string
          description: >
            Required human-readable city display value paired with `cityCode`.
        districtCode:
          type:
            - string
            - 'null'
          description: >
            Optional canonical district or county classification code. When
            district detail is separately provided, this field must travel with
            `districtName`; when district is not separately provided, both
            fields may be omitted or `null`.
        districtName:
          type:
            - string
            - 'null'
          description: >
            Optional human-readable district or county display value paired with
            `districtCode`. When district is not separately provided, both
            district fields may be omitted or `null`.
        detailAddress:
          type: string
          description: >
            Required detailed text address for the current project site. This
            field must not be hidden inside `description` and does not carry
            standardized region classification truth.
        scopeSummary:
          type: string
          description: >
            Required minimum publish-scope summary for the current project
            create/detail chain only.
        plannedStartAt:
          type:
            - string
            - 'null'
          format: date
          description: >
            Optional planned start date in `YYYY-MM-DD` format. When omitted or
            `null`, the current publish boundary treats the start date as not
            yet confirmed.
        plannedEndAt:
          type:
            - string
            - 'null'
          format: date
          description: >
            Optional planned end date in `YYYY-MM-DD` format. When omitted or
            `null`, the current publish boundary treats the end date as not yet
            confirmed.
        scheduleDetail:
          type:
            - string
            - 'null'
          maxLength: 200
          description: >
            Optional supplementary scheduling text for Round B only. This field
            may further explain `plannedStartAt` and `plannedEndAt`, but it is
            not a complete schedule object, not a time-slot array, and not a
            second calendar family.
        description:
          type: string
