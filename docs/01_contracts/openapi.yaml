        - activeMilestoneTitle
        - inspectionState
        - canOpenMilestoneList
        - canOpenMilestoneSubmit
        - canOpenInspectionDetail
        - canOpenInspectionSubmit
      description: >
        Controlled workbench summary container for the current fulfillment chain
        only. Allowed workbench actions are `open milestone list`, `open
        milestone submit`, `open inspection detail`, and `open inspection
        submit` only. This container must hide `inspection/recheck`,
        inspection history/list, governance queue, and multi-round workflow
        consoles.
      properties:
        activeMilestoneId:
          type:
            - string
            - 'null'
          description: >
            Current continuable fulfillment instance carrier only for workbench
            summary use.
        activeMilestoneTitle:
          type:
            - string
            - 'null'
        inspectionState:
          type:
            - string
            - 'null'
          description: >
