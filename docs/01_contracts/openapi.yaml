doc_meta:
  owner: Codex 总控
  status: draft
  purpose: Freeze transport contract authoring entrypoint for BFF and Server.
  layer: L2 Contracts

openapi: 3.1.0
info:
  title: Exhibition Infrastructure API
  version: 0.1.0
  description: >
    Phase 2A OpenAPI skeleton for Flutter App canonical paths, plus retained Admin and
    internal service alignment placeholders.
servers:
  - url: http://localhost:3000
    description: Local BFF
  - url: http://localhost:3001
    description: Local Server
tags:
  - name: Health
  - name: Shell
  - name: Workbench
  - name: Forum
  - name: Profile
  - name: Message
  - name: Upload
  - name: Project
  - name: Bid
  - name: Order
  - name: Contract
  - name: Milestone
  - name: Inspection
  - name: Rating
  - name: Dispute
  - name: Admin
x-contracts-generation:
  phase: first_batch
  formal_inputs:
    - docs/01_contracts/openapi.yaml
    - docs/01_contracts/error_codes.yaml
  single_generation_entry: pnpm contracts:generate
  single_drift_check_entry: pnpm contracts:check
  output_root: packages/contracts
  first_batch_outputs:
    - contracts-manifest.json
    - openapi.bundle.json
    - app-api.types.ts
    - error-codes.ts
    - index.ts
  direct_consumer_binding:
    - apps/server
    - apps/bff
  not_directly_bound_in_first_batch:
    - apps/mobile
    - apps/admin
  idempotency:
    same_input_same_output_required: true
    content_identical: true
    path_set_identical: true
    export_order_identical: true
    manifest_hash_identical: true
    forbidden_nondeterministic_content:
      - timestamp
      - machine_path
      - username
      - random_value
  drift_check_failure_conditions:
    - input_missing
    - expected_output_missing
    - output_outside_packages_contracts
    - dirty_diff_after_regeneration
    - manifest_hash_mismatch
    - multiple_generation_entries_present
paths:
  /health/live:
    get:
      tags: [Health]
      summary: Generic liveness probe skeleton
      operationId: getLiveness
      responses:
        "200":
          description: OK
  /health/ready:
    get:
      tags: [Health]
      summary: Generic readiness probe skeleton
      operationId: getReadiness
      responses:
        "200":
          description: Ready
  /api/app/shell/context:
    get:
      tags: [Shell]
      summary: Shell context canonical path for Flutter App
      operationId: getAppShellContext
      responses:
        "200":
          description: >
            The first formal app-facing shell context surface for Flutter App.
            This path freezes only the current shell projection fields and
            replaces the old non-canonical shell path; it must not remain as a
            second parallel user-facing semantic surface.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppShellContextResponse'
  /api/app/profile/index:
    get:
      tags: [Profile]
      summary: Profile index canonical path for Flutter App
      operationId: getAppProfileIndex
      responses:
        "200":
          description: >
            Minimum read-only profile aggregation for Flutter App. This path
            freezes only `organization`, `certification`, `membership`, and
            `settingsEntry`; it must not expand into account write-back,
            organization management, certification application, membership
            purchase, or a full settings subsystem.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileIndexResponse'
  /api/app/auth/otp/send:
    post:
      tags: [Auth]
      summary: OTP send canonical path for Flutter App login
      operationId: postAppAuthOtpSend
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OtpSendRequest'
      responses:
        "200":
          description: Minimum OTP send acknowledgment for Flutter App.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OtpSendResponse'
  /api/app/auth/otp/login:
    post:
      tags: [Auth]
      summary: OTP login canonical path for Flutter App
      operationId: postAppAuthOtpLogin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OtpLoginRequest'
      responses:
        "200":
          description: Minimum session establish response for Flutter App.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionEstablishResponse'
  /api/app/auth/refresh:
    post:
      tags: [Auth]
      summary: Session refresh canonical path for Flutter App
      operationId: postAppAuthRefresh
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshSessionRequest'
      responses:
        "200":
          description: Rotated app-facing access and refresh token projection.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionRefreshResponse'
  /api/app/auth/logout:
    post:
      tags: [Auth]
      summary: Logout canonical path for Flutter App
      operationId: postAppAuthLogout
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
      responses:
        "200":
          description: Minimum logout acknowledgment for Flutter App.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActionAckResponse'
  /api/app/profile/organization/create:
    post:
      tags: [Profile]
      summary: Organization create canonical path for Flutter App
      operationId: postAppProfileOrganizationCreate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrganizationCreateRequest'
      responses:
        "200":
          description: Minimum organization create response for Flutter App.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationCreateResponse'
  /api/app/profile/organization/join-by-code:
    post:
      tags: [Profile]
      summary: Organization join-by-code canonical path for Flutter App
      operationId: postAppProfileOrganizationJoinByCode
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrganizationJoinByCodeRequest'
      responses:
        "200":
          description: Minimum organization join-by-code response for Flutter App.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationJoinByCodeResponse'
  /api/app/profile/organization/switch:
    post:
      tags: [Profile]
      summary: Organization switch canonical path for Flutter App
      operationId: postAppProfileOrganizationSwitch
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrganizationSwitchRequest'
      responses:
        "200":
          description: Switched shell context projection for Flutter App.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppShellContextResponse'
  /api/app/profile/organization/mine:
    get:
      tags: [Profile]
      summary: My organizations canonical path for Flutter App
      operationId: getAppProfileOrganizationMine
      responses:
        "200":
          description: Minimum list of organizations available to the current actor.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MyOrganizationsResponse'
  /api/app/profile/organization/members:
    get:
      tags: [Profile]
      summary: Organization members canonical path for Flutter App
      operationId: getAppProfileOrganizationMembers
      responses:
        "200":
          description: Minimum list of current organization members for Flutter App.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationMembersResponse'
  /api/app/profile/organization/members/{memberId}/role:
    patch:
      tags: [Profile]
      summary: Organization member role patch canonical path for Flutter App
      operationId: patchAppProfileOrganizationMemberRole
      parameters:
        - in: path
          name: memberId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrganizationMemberRolePatchRequest'
      responses:
        "200":
          description: Minimum organization member role patch acknowledgment.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActionAckResponse'
  /api/app/profile/organization/members/{memberId}/disable:
    patch:
      tags: [Profile]
      summary: Organization member disable canonical path for Flutter App
      operationId: patchAppProfileOrganizationMemberDisable
      parameters:
        - in: path
          name: memberId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrganizationMemberDisableRequest'
      responses:
        "200":
          description: Minimum organization member disable acknowledgment.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActionAckResponse'
  /api/app/profile/certification/submit:
    post:
      tags: [Profile]
      summary: Certification submit canonical path for Flutter App
      operationId: postAppProfileCertificationSubmit
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CertificationSubmitRequest'
      responses:
        "200":
          description: Minimum certification submit response for Flutter App.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CertificationSubmitResponse'
  /api/app/profile/certification/current:
    get:
      tags: [Profile]
      summary: Current certification canonical path for Flutter App
      operationId: getAppProfileCertificationCurrent
      responses:
        "200":
          description: Minimum current certification projection for Flutter App.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CertificationCurrentResponse'
  /api/app/profile/certification/resubmit:
    post:
      tags: [Profile]
      summary: Certification resubmit canonical path for Flutter App
      operationId: postAppProfileCertificationResubmit
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CertificationResubmitRequest'
      responses:
        "200":
          description: Minimum certification resubmit response for Flutter App.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CertificationSubmitResponse'
  /api/app/profile/security/devices:
    get:
      tags: [Profile]
      summary: Security devices canonical path for Flutter App
      operationId: getAppProfileSecurityDevices
      responses:
        "200":
          description: Minimum current user device list for Flutter App.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SecurityDevicesResponse'
  /api/app/profile/security/devices/{deviceId}/revoke:
    post:
      tags: [Profile]
      summary: Security device revoke canonical path for Flutter App
      operationId: postAppProfileSecurityDeviceRevoke
      parameters:
        - in: path
          name: deviceId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeviceRevokeRequest'
      responses:
        "200":
          description: Minimum device revoke acknowledgment for Flutter App.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActionAckResponse'
  /api/app/profile/membership/current:
    get:
      tags: [Profile]
      summary: Paid membership current canonical path for Flutter App
      operationId: getAppProfileMembershipCurrent
      responses:
        "200":
          description: Minimum current paid-membership projection for Flutter App.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MembershipCurrentResponse'
  /api/app/profile/membership/explanation:
    get:
      tags: [Profile]
      summary: Paid membership explanation canonical path for Flutter App
      operationId: getAppProfileMembershipExplanation
      responses:
        "200":
          description: Minimum paid-membership explanation projection for Flutter App.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MembershipExplanationResponse'
  /api/app/profile/membership/quota:
    get:
      tags: [Profile]
      summary: Paid membership quota canonical path for Flutter App
      operationId: getAppProfileMembershipQuota
      responses:
        "200":
          description: Minimum paid-membership quota summary for Flutter App.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MembershipQuotaResponse'
  /api/app/profile/membership/upgrade-guide:
    get:
      tags: [Profile]
      summary: Paid membership upgrade-guide canonical path for Flutter App
      operationId: getAppProfileMembershipUpgradeGuide
      responses:
        "200":
          description: Minimum paid-membership upgrade guidance for Flutter App.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MembershipUpgradeGuideResponse'
  /api/app/profile/governance/status:
    get:
      tags: [Profile]
      summary: Profile governance-status canonical path for Flutter App
      operationId: getAppProfileGovernanceStatus
      responses:
        "200":
          description: >
            Minimum governance summary for the current actor and organization
            scope only. This path does not reopen a full governance center,
            penalty history, or appeal history.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileGovernanceStatusResponse'
        "404":
          description: >
            Controlled unavailable response. If the current governance summary is
            hidden or not materialized for the current actor scope, the server or
            BFF must return `GOVERNANCE_STATUS_UNAVAILABLE`.
  /api/app/profile/governance/appeals:
    post:
      tags: [Profile]
      summary: Profile governance appeal-submit canonical path for Flutter App
      operationId: postAppProfileGovernanceAppealSubmit
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GovernanceAppealSubmitRequest'
      responses:
        "200":
          description: >
            Minimum governance appeal-submit acknowledgment only. This path does
            not reopen appeal list, appeal detail, or user-side adjudication
            surfaces.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GovernanceAppealSubmitResponse'
        "400":
          description: >
            Controlled invalid appeal-submit response. If the request body is
            malformed or missing the minimum required fields, the server must
            return `GOVERNANCE_APPEAL_SUBMIT_INVALID`.
        "404":
          description: >
            Controlled unavailable response. If the targeted penalty truth is not
            available to the current actor scope, the server must return
            `GOVERNANCE_PENALTY_RESOURCE_UNAVAILABLE`.
  /api/app/message/index:
    get:
      tags: [Message]
      summary: Instance todo index canonical path for Flutter App messages building
      operationId: getAppMessageIndex
      responses:
        "200":
          description: >
            The current app-facing canonical path for `instance_todo` list/items
            consumption in the `messages` building. This path carries only the
            frozen `instance_todo` item skeleton and the frozen unified
            registered-entry `routeTarget` projection. This path is a controlled
            projection carrier only; it is not a full
            `RegisteredInstanceEntryItem` exposure surface, not a
            general-purpose message center, not a station inbox, not a
            workbench, not a governance console, and not a new path expansion
            surface.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InstanceTodoIndexResponse'
  /api/app/exhibition/home:
    get:
      tags: [Exhibition]
      summary: Exhibition ordered-home aggregation canonical path for Flutter App
      operationId: getAppExhibitionHome
      parameters:
        - in: query
          name: latitude
          required: false
          schema:
            type: number
            format: double
          description: >
            Current request device latitude hint only. This hint does not
            create persisted location truth.
        - in: query
          name: longitude
          required: false
          schema:
            type: number
            format: double
          description: >
            Current request device longitude hint only. This hint does not
            create persisted location truth.
        - in: query
          name: provinceCode
          required: false
          schema:
            type: string
          description: >
            Current request effective province hint only. `BFF` may still
            prefer the current manual selection when one exists in the current
            session.
        - in: query
          name: provinceName
          required: false
          schema:
            type: string
          description: >
            Current request effective province display hint only.
        - in: query
          name: locationPermissionState
          required: false
          schema:
            $ref: '#/components/schemas/HomeLocationPermissionState'
          description: >
            Client-reported device location permission state for current home
            aggregation only.
      responses:
        "200":
          description: >
            Ordered exhibition home aggregation for Flutter App. This path
            freezes one normalized first-screen read model only, including the
            current location and weather card, six module containers, and
            ordered recommendation sections. The current weather card may
            include the V1 construction warning semantic layer, but it must
            not become weather truth, location truth, a second recommendation
            state machine, or a second private dashboard.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExhibitionHomeResponse'
        "400":
          description: >
            Controlled effective-location unavailable response. When neither
            current request hints, current session selection, nor allowed
            fallback context can resolve a usable location, `BFF` must return
            `LOCATION_REQUIRED` or `LOCATION_PERMISSION_UNAVAILABLE`.
        "503":
          description: >
            Controlled home aggregation unavailable response. `BFF` must
            normalize upstream weather or aggregation failures into
            `HOME_WEATHER_UPSTREAM_UNAVAILABLE` or
            `HOME_AGGREGATION_UNAVAILABLE`.
  /api/app/exhibition/home/refresh:
    post:
      tags: [Exhibition]
      summary: Refresh ordered exhibition home aggregation via canonical path for Flutter App
      operationId: refreshAppExhibitionHome
      requestBody:
        required: false
        description: >
          Optional current request location context only. Refresh must rebuild
          the full current home aggregation, not only the weather block.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExhibitionHomeRefreshRequest'
      responses:
        "200":
          description: >
            Refreshed exhibition ordered-home aggregation. This success body is
            the same normalized full-home read model returned by
            `GET /api/app/exhibition/home`, including the current V1
            construction warning semantic layer when available.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExhibitionHomeResponse'
        "400":
          description: >
            Controlled effective-location unavailable response. `BFF` must
            return `LOCATION_REQUIRED` or `LOCATION_PERMISSION_UNAVAILABLE`
            when refresh cannot determine the effective location.
        "504":
          description: >
            Controlled full-home refresh timeout response. `BFF` must return
            `HOME_REFRESH_TIMEOUT` when the current full-home aggregation
            exceeds the timeout boundary.
        "503":
          description: >
            Controlled home aggregation unavailable response. `BFF` must
            normalize upstream weather or aggregation failures into
            `HOME_WEATHER_UPSTREAM_UNAVAILABLE` or
            `HOME_AGGREGATION_UNAVAILABLE`.
  /api/app/exhibition/home/location/select:
    post:
      tags: [Exhibition]
      summary: Select current exhibition home location via canonical path for Flutter App
      operationId: selectAppExhibitionHomeLocation
      requestBody:
        required: true
        description: >
          Manual current-location selection request for the ordered exhibition
          home only. In the current round this handoff may stay `BFF`-controlled
          and non-persistent.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExhibitionHomeLocationSelectRequest'
      responses:
        "200":
          description: >
            Location selection accepted for the current ordered home
            aggregation. When the current round does not persist location to
            `Server`, the returned read model must explicitly mark
            `selectionScope` and `selectionNotice` instead of pretending the
            choice was stored permanently. The returned read model may also
            refresh the current V1 construction warning semantic layer.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExhibitionHomeResponse'
        "400":
          description: >
            Controlled location selection invalid response. When the current
            manual selection body cannot produce a usable effective province,
            `BFF` must return `LOCATION_REQUIRED`.
  /api/app/exhibition/workbench:
    get:
      tags: [Workbench]
      summary: Exhibition private workbench summary canonical path for Flutter App
      operationId: getAppExhibitionWorkbench
      responses:
        "200":
          description: >
            The only current app-facing exhibition private workbench summary
            path. This path freezes only the controlled summary projection for
            `project_chain`, `order_chain`, `fulfillment_chain`, and
            `extension_boundary`. It is a `BFF` summary carrier only; it must
            not become project, order, contract, milestone, inspection,
            rating, or dispute truth, must not introduce a second workflow
            state machine, and must not expose `rating/submit`,
            `inspection/recheck`, or `dispute/withdraw` as workbench executable
            actions.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExhibitionWorkbenchSummaryResponse'
  /api/app/exhibition/enterprise-hub/enterprises:
    get:
      tags: [Exhibition]
      summary: Enterprise hub board list canonical path for Flutter App
      operationId: getAppEnterpriseHubEnterprises
      parameters:
        - in: query
          name: boardType
          required: true
          schema:
            $ref: '#/components/schemas/EnterpriseHubBoardType'
        - in: query
          name: keyword
          required: false
          schema:
            type: string
        - in: query
          name: provinceCode
          required: false
          schema:
            type: string
        - in: query
          name: cityCode
          required: false
          schema:
            type: string
        - in: query
          name: certifiedOnly
          required: false
          schema:
            type: boolean
        - in: query
          name: sortBy
          required: false
          schema:
            type: string
            enum:
              - default
              - latest
              - cases_desc
        - in: query
          name: exhibitionType
          required: false
          schema:
            type: string
        - in: query
          name: serviceCity
          required: false
          schema:
            type: string
        - in: query
          name: caseCountRange
          required: false
          schema:
            type: string
        - in: query
          name: reputationLevel
          required: false
          schema:
            type: string
        - in: query
          name: processType
          required: false
          schema:
            type: string
        - in: query
          name: plantAreaRange
          required: false
          schema:
            type: string
        - in: query
          name: urgentCapability
          required: false
          schema:
            $ref: '#/components/schemas/EnterpriseHubUrgentOrderCapability'
        - in: query
          name: warehouseCapability
          required: false
          schema:
            type: boolean
        - in: query
          name: supplyCategory
          required: false
          schema:
            type: string
        - in: query
          name: supplyMode
          required: false
          schema:
            type: string
        - in: query
          name: responseLevel
          required: false
          schema:
            type: string
        - in: query
          name: page
          required: false
          schema:
            type: integer
            minimum: 1
        - in: query
          name: pageSize
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 50
      responses:
        "200":
          description: >
            Enterprise hub board list projection for Flutter App. This path
            freezes one list read model only and must not become organization
            identity truth, certification truth, or a second ranking state
            machine.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnterpriseHubListResponse'
        "400":
          description: >
            Controlled invalid board or query response. `BFF` must return
            `ENTERPRISE_HUB_INVALID_BOARD_TYPE` when boardType is missing or
            unsupported.
  /api/app/exhibition/enterprise-hub/enterprises/{enterpriseId}:
    get:
      tags: [Exhibition]
      summary: Enterprise hub detail canonical path for Flutter App
      operationId: getAppEnterpriseHubEnterpriseDetail
      parameters:
        - in: path
          name: enterpriseId
          required: true
          schema:
            type: string
        - in: query
          name: boardType
          required: true
          schema:
            $ref: '#/components/schemas/EnterpriseHubBoardType'
      responses:
        "200":
          description: >
            Enterprise hub detail read model for Flutter App. This path
            freezes one details projection only and must not become
            organization, certification, or recommendation truth.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnterpriseHubDetailResponse'
        "404":
          description: >
            Controlled enterprise-unavailable response. `Server` must return
            `ENTERPRISE_HUB_ENTERPRISE_NOT_FOUND` when the requested listing is
            absent or hidden under the current boundary.
  /api/app/exhibition/enterprise-hub/recommendations:
    get:
      tags: [Exhibition]
      summary: Enterprise hub recommendation slots canonical path for Flutter App
      operationId: getAppEnterpriseHubRecommendations
      parameters:
        - in: query
          name: boardType
          required: true
          schema:
            $ref: '#/components/schemas/EnterpriseHubBoardType'
      responses:
        "200":
          description: >
            Enterprise hub recommendation slot projection for the selected
            board only.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnterpriseHubRecommendationListResponse'
  /api/app/exhibition/enterprise-hub/applications:
    post:
      tags: [Exhibition]
      summary: Create enterprise hub application canonical path for Flutter App
      operationId: createAppEnterpriseHubApplication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EnterpriseHubCreateApplicationRequest'
      responses:
        "200":
          description: Created current enterprise hub application draft under current organization scope.
          content:
            application/json:
              schema:
