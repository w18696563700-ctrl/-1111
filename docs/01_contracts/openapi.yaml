            use.
        activeOrderNo:
          type:
            - string
            - 'null'
        activeOrderState:
          type:
            - string
            - 'null'
          description: >
            Projected current order truth state only. No second order state
            machine is frozen here.
        canOpenOrderDetail:
          type: boolean
        canOpenContractDetail:
          type: boolean
        canOpenDisputeOpen:
          type: boolean
    WorkbenchFulfillmentChain:
      type: object
      required:
