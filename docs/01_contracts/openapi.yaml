  /api/app/exhibition/enterprise-hub/location/resolve:
    post:
      tags: [Exhibition]
      summary: Resolve enterprise location candidate through the bounded app-facing Amap-backed enterprise location capability
      operationId: resolveAppEnterpriseHubLocation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                resolveMode:
                  type: string
                  enum: [device_location, manual_address]
                addressText:
                  type: string
                provinceCode:
                  type: string
                provinceName:
                  type: string
                cityCode:
                  type: string
                cityName:
                  type: string
                districtCode:
                  type: string
                districtName:
                  type: string
                latitude:
                  type: number
                longitude:
                  type: number
              required: [resolveMode]
      responses:
        "200":
          description: >
            Resolved enterprise location candidate. `Server` remains the only
            owner of the enterprise location truth; BFF only forwards and
            shapes this candidate for the workbench save flow.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                properties:
                  location:
                    $ref: '#/components/schemas/EnterpriseHubLocationTruth'
                  message:
                    type:
                      - string
                      - 'null'
                required: [location]
        "400":
          description: >
            Controlled invalid resolve response. `BFF` must return
            `ENTERPRISE_LOCATION_RESOLVE_INVALID` for malformed resolve input;
            `Server` may return `ENTERPRISE_LOCATION_RESOLVE_FAILED` when the
            provider returns no usable result and the request cannot be
            represented as a text-only candidate.
        "401":
          description: >
            Controlled unauthenticated response. `BFF` must return
            `AUTH_SESSION_INVALID` when current actor session is unavailable.
        "403":
          description: >
            Controlled permission response. `Server` must return
            `ENTERPRISE_HUB_PERMISSION_DENIED` when the current actor lacks
            organization scope for enterprise location resolution.
        "503":
          description: >
            Controlled provider response. `Server` must return
            `ENTERPRISE_LOCATION_PROVIDER_CONFIG_MISSING` or
            `ENTERPRISE_LOCATION_RESOLVE_PROVIDER_UNAVAILABLE` when Amap cannot
            be used under the current cloud runtime.
