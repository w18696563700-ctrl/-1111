    InstanceRef:
      type: object
      required:
        - objectType
        - instanceId
      properties:
        objectType:
          type: string
          enum:
            - contract
            - inspection
            - rating
            - dispute
        instanceId:
          type: string
    InstanceTodoRouteTarget:
      type: object
      required:
        - canonicalPath
        - localEntryKey
        - requiredParams
        - state
        - routeParams
      description: >
        Controlled registered-entry projection only. This is not a local route
        name, not a second app-facing path, and not a complete
        `RegisteredInstanceEntryItem` exposure surface. The old
        `routeTarget.routeName` target contract has exited the formal schema.
      properties:
        canonicalPath:
          type: string
          enum:
            - /api/app/contract/detail
            - /api/app/inspection/detail
            - /api/app/rating/entry
            - /api/app/order/detail
          description: App-facing canonical entry reference only.
        localEntryKey:
          type: string
          description: Consumer-local stable key only; not a route path.
        requiredParams:
          type: array
          items:
            type: string
            enum:
              - orderId
              - milestoneId
              - disputeId
          description: >
            Frozen minimum parameter shape for the selected registered entry.
        state:
          type: string
          enum:
            - enabled
          description: >
            Minimum registered-entry enablement state only. This state belongs
            to the projected entry target, not to the `instance_todo` item.
        routeParams:
          type: object
          additionalProperties:
            type: string
          description: >
            Concrete parameter values bound to the frozen `requiredParams`
            shape.
    InstanceTodoItem:
      type: object
      required:
        - todoId
        - messageType
        - instanceRef
        - actionKey
        - title
        - summary
        - routeTarget
        - state
      properties:
        todoId:
          type: string
        messageType:
          type: string
          enum:
            - instance_todo
        instanceRef:
          $ref: '#/components/schemas/InstanceRef'
        actionKey:
          type: string
          enum:
            - contract.confirm
            - contract.amend
            - inspection.submit
            - rating.submit
            - dispute.open
            - dispute.withdraw
        title:
          type: string
        summary:
          type: string
        routeTarget:
          $ref: '#/components/schemas/InstanceTodoRouteTarget'
        state:
          type: string
          enum:
            - pending
          description: >
            Minimum `instance_todo` pending state only. This state belongs to
            the todo carrier item and must not be mixed with
            `routeTarget.state`, which belongs to the registered entry
            projection.
    RegisteredInstanceEntryItem:
      type: object
      required:
        - entryKey
        - objectType
        - actionKey
        - canonicalPath
        - requiredParams
        - consumerBuilding
        - localEntryKey
        - state
      properties:
        entryKey:
          type: string
          description: Stable registration-row key for the unified instance entry registry.
        objectType:
          type: string
          enum:
            - contract
            - inspection
            - rating
            - dispute
        actionKey:
          type: string
          enum:
            - contract.confirm
            - contract.amend
            - inspection.submit
            - rating.submit
            - dispute.open
            - dispute.withdraw
        canonicalPath:
          type: string
          enum:
            - /api/app/contract/detail
            - /api/app/inspection/detail
            - /api/app/rating/entry
            - /api/app/order/detail
          description: App-facing canonical entry reference only; not frontend routing detail.
        requiredParams:
          type: array
          items:
            type: string
            enum:
              - orderId
              - milestoneId
              - disputeId
        consumerBuilding:
          type: string
          enum:
            - messages
          description: Existing consumer building for the first pre-embed registration batch.
        localEntryKey:
          type: string
          description: Consumer-local stable key only; not a canonical path or route path.
        state:
          type: string
          enum:
            - enabled
