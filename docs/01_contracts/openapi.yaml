        - activeOrderNo
        - activeOrderState
        - canOpenOrderDetail
        - canOpenContractDetail
        - canOpenDisputeOpen
      description: >
        Controlled workbench summary container for the current order chain only.
        Allowed workbench actions are `open order detail`, `open contract
        detail`, and `open dispute open` only. This container must hide
        `rating/submit`, `dispute/withdraw`, contract history/list, and any
        second order workflow.
