x-instance-todo-registry:
  capability: instance_todo_touchpoint
  messageType:
    fixed: instance_todo
  state:
    fixed: pending
  objectTypes:
    first_batch:
      - contract
      - inspection
      - rating
      - dispute
  actionKeys:
    first_batch:
      - contract.confirm
      - contract.amend
      - inspection.submit
      - rating.submit
      - dispute.open
      - dispute.withdraw
  routeTargetBoundary:
    existing_signed_instance_entry_only: true
    new_app_facing_path_forbidden: true
    arbitrary_deeplink_forbidden: true
x-unified-instance-entry-registry:
  capability: unified_instance_entry_registration_preembed
  itemSchema:
    $ref: '#/components/schemas/RegisteredInstanceEntryItem'
  first_batch:
    - entryKey: contract_confirm_entry
      objectType: contract
      actionKey: contract.confirm
      canonicalPath: /api/app/contract/detail
      requiredParams:
        - orderId
      consumerBuilding: messages
      localEntryKey: registered.contract.confirm
      state: enabled
    - entryKey: contract_amend_entry
      objectType: contract
      actionKey: contract.amend
      canonicalPath: /api/app/contract/detail
      requiredParams:
        - orderId
      consumerBuilding: messages
      localEntryKey: registered.contract.amend
      state: enabled
    - entryKey: inspection_submit_entry
      objectType: inspection
      actionKey: inspection.submit
      canonicalPath: /api/app/inspection/detail
      requiredParams:
        - milestoneId
      consumerBuilding: messages
      localEntryKey: registered.inspection.submit
      state: enabled
    - entryKey: rating_submit_entry
      objectType: rating
      actionKey: rating.submit
      canonicalPath: /api/app/rating/entry
      requiredParams:
        - orderId
      consumerBuilding: messages
      localEntryKey: registered.rating.submit
      state: enabled
    - entryKey: dispute_open_entry
      objectType: dispute
      actionKey: dispute.open
      canonicalPath: /api/app/order/detail
      requiredParams:
        - orderId
      consumerBuilding: messages
      localEntryKey: registered.dispute.open
      state: enabled
    - entryKey: dispute_withdraw_entry
      objectType: dispute
      actionKey: dispute.withdraw
      canonicalPath: /api/app/order/detail
      requiredParams:
        - disputeId
        - orderId
      consumerBuilding: messages
      localEntryKey: registered.dispute.withdraw
      state: enabled
components:
  schemas:
    AppVisibleBuilding:
      type: string
      enum:
        - exhibition
        - messages
        - profile
        - renovation
        - custom_furniture
      description: >
        Controlled shell-visible building code only. This field is a shell
        projection, not a second navigation tree or local route contract.
    AppShellUnreadSummary:
      type: object
      description: >
        Controlled unread bucket summary only. This object is not a message
        center truth surface, delivery-state ledger, or notification
        orchestration model.
      additionalProperties:
        type: integer
        minimum: 0
    AppShellContextResponse:
      type: object
      required:
        - userId
        - organizationId
        - roleKeys
        - certificationStatus
        - membershipStatus
        - visibleBuildings
        - featureFlagsVersion
        - unreadSummary
      properties:
        userId:
          type: string
        organizationId:
          type:
            - string
            - 'null'
          description: >
            Nullable when the current actor has no organization scope.
        roleKeys:
          type: array
          items:
            type: string
          uniqueItems: true
        certificationStatus:
          type:
            - string
            - 'null'
        membershipStatus:
          type:
            - string
            - 'null'
        visibleBuildings:
          type: array
          items:
            $ref: '#/components/schemas/AppVisibleBuilding'
          uniqueItems: true
        featureFlagsVersion:
          type: string
        unreadSummary:
          $ref: '#/components/schemas/AppShellUnreadSummary'
        paidMembershipTier:
          type:
            - string
            - 'null'
        paidMembershipEntitlementsSummary:
          type: array
          items:
            type: string
        paidMembershipQuotaSummary:
          type: array
