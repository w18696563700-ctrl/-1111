map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

upstream bff_upstream {
    server 127.0.0.1:3000;
}

upstream server_upstream {
    server 127.0.0.1:3001;
}

upstream admin_upstream {
    server 127.0.0.1:3002;
}

server {
    listen 80 default_server;
    listen 443 ssl default_server;
    server_name _ 47.108.180.198;
    ssl_certificate /etc/nginx/ssl/exhibition-ip/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/exhibition-ip/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    client_max_body_size 100m;

    location = /ios-install {
        return 302 /ios-install/index.html;
    }

    location = /ios-install/ {
        return 302 /ios-install/index.html;
    }

    location ^~ /ios-install/ {
        alias /var/www/exhibition-iphone-install/;
        types {
            application/octet-stream ipa;
            text/xml plist;
            text/html html;
            image/png png;
        }
        default_type application/octet-stream;
        add_header Cache-Control "no-store";
        try_files $uri =404;
    }

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
        default_type text/plain;
        try_files $uri =404;
    }

    location /health/bff/live {
        proxy_pass http://bff_upstream/health/live;
    }

    location /health/bff/ready {
        proxy_pass http://bff_upstream/health/ready;
    }

    location /health/server/live {
        proxy_pass http://server_upstream/health/live;
    }

    location /health/server/ready {
        proxy_pass http://server_upstream/health/ready;
    }

    location = /api/app/exhibition/workbench {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://bff_upstream;
    }

    location = /api/app/project/list {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://bff_upstream;
    }

    location ^~ /api/app/forum/ {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://bff_upstream;
    }

    location ^~ /api/app/bff/forum/ {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        rewrite ^/api/app/bff/(.*)$ /bff/$1 break;
        proxy_pass http://bff_upstream;
    }

    location ^~ /api/app/auth/ {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://bff_upstream;
    }

    location = /api/app/my/projects {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://bff_upstream;
    }

    location ^~ /api/app/my/projects/ {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://bff_upstream;
    }

    location = /api/app/message/project-communication/realtime {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 3600s;
        proxy_pass http://bff_upstream;
    }

    location ~ ^/api/app/(auth|shell|workbench|exhibition|forum|project|project-counterparty-rating|bid|order|milestone|file|message|profile|platform|contract|inspection|rating|dispute|notifications|confirmation)(/.*)?$ {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://bff_upstream;
    }

    location ~ ^/api/app/bff/(auth|shell|workbench|exhibition|forum|project|project-counterparty-rating|bid|order|milestone|file|message|profile|platform|contract|inspection|rating|dispute|notifications|confirmation)(/.*)?$ {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        rewrite ^/api/app/bff/(.*)$ /bff/$1 break;
        proxy_pass http://bff_upstream;
    }

    location = /governance {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
